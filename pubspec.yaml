name: streambox
description: StreamBox - Multi-platform Streaming & Download App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Networking
  dio: ^5.4.0

  # Video Player
  chewie: ^1.7.4
  video_player: ^2.8.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Download
  dio_smart_retry: ^6.0.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  photo_view: ^0.15.0

  # Utils
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
