plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "com.example.streambox"
    compileSdk = 35
    ndkVersion = "26.1.10909125"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.example.streambox"
        minSdk = 21
        targetSdk = 35
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

// Decode base64 icon files before resource merging
tasks.register("decodeIconFiles") {
    def resDir = file("src/main/res")
    def densities = ["mdpi", "hdpi", "xhdpi", "xxhdpi", "xxxhdpi"]
    
    doLast {
        densities.each { density ->
            def b64File = file("${resDir}/mipmap-${density}/ic_launcher.b64")
            def pngFile = file("${resDir}/mipmap-${density}/ic_launcher.png")
            if (b64File.exists()) {
                println "Decoding icon: mipmap-${density}/ic_launcher.png"
                def b64Text = b64File.text.trim()
                def decoded = Base64.decoder.decode(b64Text)
                pngFile.bytes = decoded
                b64File.delete()
            }
        }
    }
}

tasks.configureEach { task ->
    if (task.name.contains("mergeReleaseResources") || task.name.contains("mergeDebugResources")) {
        task.dependsOn("decodeIconFiles")
    }
}

flutter {
    source = "../.."
}
