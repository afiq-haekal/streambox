plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "com.example.streambox"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.example.streambox"
        minSdk = 21
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    sourceSets {
        main {
            res.srcDirs = ['src/main/res']
        }
    }

    // Exclude corrupted mipmap files from resource compilation
    android.applicationVariants.all { variant ->
        variant.mergeResourcesProvider.configure {
            doFirst {
                // Delete all corrupted/invalid files from mipmap folders before merging
                def resDir = file("src/main/res")
                resDir.eachDirMatch(~/mipmap-.*/) { dir ->
                    dir.eachFile { f ->
                        if (f.name.endsWith('.b64') || (f.name.endsWith('.png') && f.length() < 100)) {
                            println "Removing invalid resource: ${f.path}"
                            f.delete()
                        }
                    }
                }
            }
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
